kind = "web"
previewPath = "/"
title = "A&L Financial Solutions"
version = "1.0.0"
id = "artifacts/al-financial"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18121

[services.development]
run = "pnpm --filter @workspace/al-financial run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/al-financial", "run", "build" ]
publicDir = "artifacts/al-financial/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18121"
BASE_PATH = "/"
